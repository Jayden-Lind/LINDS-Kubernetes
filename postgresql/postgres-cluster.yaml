apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: minio-store
  namespace: postgresql-linds
spec:
  configuration:
    destinationPath: s3://postgresql-backup
    endpointURL: http://jd-truenas-01.linds.com.au:9000
    s3Credentials:
      accessKeyId:
        name: cnpg-s3-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-s3-creds
        key: SECRET_ACCESS_KEY
    wal:
      compression: zstd
      maxParallel: 8
    data:
      compression: bzip2
  retentionPolicy: 7d
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linds-postgres
  namespace: postgresql-linds
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-user
  storage:
    size: 50Gi
    storageClass: nfs-csi
  resources:
    requests:
      memory: "2048Mi"
      cpu: "500m"
    limits:
      memory: "409Gi"
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      shared_buffers: "1024MB"
      effective_cache_size: "3072MB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      max_connections: "400"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      wal_buffers: "16MB"
      max_wal_size: "1GB"
      min_wal_size: "256MB"
      checkpoint_completion_target: "0.9"
      log_min_duration_statement: "1000"
      idle_in_transaction_session_timeout: "300000"
      tcp_keepalives_idle: "600"
      tcp_keepalives_interval: "30"
      tcp_keepalives_count: "10"
  managed:
    roles:
      - name: catcrawl
        ensure: present
        login: true
        passwordSecret:
          name: catcrawl-auth
      - name: immich
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: immich-auth
  affinity:
    nodeSelector:
      datacenter: "jd"
    enablePodAntiAffinity: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      parameters:
        enabled: "true"
        isWALArchiver: "true"
        barmanObjectName: minio-store
        serverName: linds-postgres-restored-4
  bootstrap:
    recovery:
      source: backup-truenas          # matches externalClusters[].name
  externalClusters:
  - name: backup-truenas
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: minio-store # read from this object store
        serverName: linds-postgres-restored-3
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: linds-postgres-lindrea
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  name: lindrea
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: linds-postgres-lindrea-th
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  name: lindrea_th
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: linds-postgres-zabbix
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  name: zabbix
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: linds-postgres-catcrawl
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  name: catcrawl
  owner: catcrawl
---
apiVersion: postgresql.cnpg.io/v1
