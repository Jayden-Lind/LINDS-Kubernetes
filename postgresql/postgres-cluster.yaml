apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: minio-store
  namespace: postgresql-linds
spec:
  configuration:
    destinationPath: s3://postgresql-backup
    endpointURL: http://jd-s3-01.linds.com.au:9000
    s3Credentials:
      accessKeyId:
        name: cnpg-s3-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-s3-creds
        key: SECRET_ACCESS_KEY
    wal:
      compression: zstd
      maxParallel: 8
    data:
      compression: lz4 # requires plugin >= 0.13; much faster backups than bzip2
  retentionPolicy: 7d
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linds-postgres
  namespace: postgresql-linds
  annotations:
    # Allows a rebuilt cluster to restore from and archive to the same
    # serverName path (see README.md) instead of bumping serverName each time.
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 2
  # Pinned by digest: floating tags caused instances to run different builds
  # (pgvector 0.8.1 vs 0.8.2), breaking Immich. Update tag + digest together.
  # "standard" flavour ships pgvector; the plain ":18" system images are deprecated.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:802cb43a4d482acf1037b418e421c865b16959ba22e07f16fc003e06cb21084c
  primaryUpdateMethod: switchover
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-user
  storage:
    size: 50Gi
    storageClass: nfs-csi
  resources:
    # 8Gi fits both jd workers alongside existing requests; larger would only
    # schedule on one node and defeat the anti-affinity spread.
    requests:
      memory: "8Gi"
      cpu: "500m"
    limits:
      memory: "8Gi"
  monitoring:
    enablePodMonitor: true
  postgresql:
    shared_preload_libraries:
      - pg_prewarm # autoprewarm reloads the buffer cache after restarts/switchovers
      - pg_stat_statements
    parameters:
      # Any pg_stat_statements.* parameter marks the extension "used" — without
      # one, CNPG's managed-extensions logic DROPs it in every database, fighting
      # the Database CRs that ensure it present.
      pg_stat_statements.track: "top"
      pg_stat_statements.max: "5000"
      shared_buffers: "4GB"
      effective_cache_size: "7GB"
      work_mem: "32MB"
      maintenance_work_mem: "512MB"
      max_connections: "400"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      wal_buffers: "64MB"
      wal_compression: "lz4"
      max_wal_size: "4GB"
      min_wal_size: "512MB"
      checkpoint_completion_target: "0.9"
      track_io_timing: "on"
      log_min_duration_statement: "1000"
      idle_in_transaction_session_timeout: "300000"
      tcp_keepalives_idle: "600"
      tcp_keepalives_interval: "30"
      tcp_keepalives_count: "10"
  managed:
    roles:
      - name: catcrawl
        ensure: present
        login: true
        passwordSecret:
          name: catcrawl-auth
      - name: immich
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: immich-auth
  affinity:
    nodeSelector:
      datacenter: "jd"
    enablePodAntiAffinity: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      parameters:
        enabled: "true"
        isWALArchiver: "true"
        barmanObjectName: minio-store
        serverName: linds-postgres-restored-4
  # bootstrap is only consulted at cluster creation. It restores from this
  # cluster's own archive path (same serverName as the plugin above); the
  # skipEmptyWalArchiveCheck annotation makes that legal, so a rebuild is just
  # "delete cluster, re-apply this manifest" — no serverName bump needed.
  bootstrap:
    recovery:
      source: own-archive             # matches externalClusters[].name
  externalClusters:
  - name: own-archive
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: minio-store # read from this object store
        serverName: linds-postgres-restored-4
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: linds-postgres-lindrea
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  name: lindrea
  extensions:
    - name: pg_stat_statements
      ensure: present
---
