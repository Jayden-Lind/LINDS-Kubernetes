apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: linds-postgres-nightly
  namespace: postgresql-linds
spec:
  cluster:
    name: linds-postgres
  schedule: "0 0 0 * * *"
  immediate: true
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: minio-store
