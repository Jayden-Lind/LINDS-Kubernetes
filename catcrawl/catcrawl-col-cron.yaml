apiVersion: batch/v1
kind: CronJob
metadata:
  name: catcrawl-col-scheduler
  namespace: default
spec:
  schedule: "0 2 * * 3"            # Wednesdays at 02:00
  concurrencyPolicy: Forbid        # never overlap two crawls
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 14400 # 4h hard cap per run
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull-secret
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          # busybox initContainer fixes ownership of the PVC on first
          # mount so the non-root main container (UID 1001) can write
          # Chromium's SingletonLock and cookie store.
          # The PVC is pre-chowned to 1001:1001 on the NFS server; every
          # file Chromium writes thereafter is already owned by 1001
          # (the main container's UID). All this initContainer needs to
          # do is clear the stale Chromium singleton lock files left
          # behind by the previous pod — they're symlinks containing
          # <hostname>-<pid>, and a new pod with a different hostname
          # makes Chromium refuse to start ("profile appears to be in
          # use ... on another computer"). concurrencyPolicy: Forbid
          # already prevents two real concurrent runs.
          initContainers:
            - name: clear-chrome-locks
              image: busybox:1.36
              command:
                - sh
                - -c
                - "rm -f /data/chrome-profile/Singleton* /data/chrome-profile/*/Singleton* 2>/dev/null; echo done"
              volumeMounts:
                - name: chrome-profile
                  mountPath: /data/chrome-profile
          containers:
            - name: catcrawl-coles
              image: ghcr.io/jayden-lind/cat-crawl-coles:latest
              imagePullPolicy: Always
              args:
                - "-source=website"
                - "-chrome-profile=/data/chrome-profile"
              env:
                - name: DB_HOST
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: DB_HOST } }
                - name: DB_USER
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: DB_USER } }
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: DB_PASSWORD } }
                - name: DB_PORT
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: DB_PORT } }
                - name: CAT_STORE_ID
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: CAT_STORE_ID } }
                - name: API_KEY
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: API_KEY } }
                - name: API_URL
                  valueFrom: { secretKeyRef: { name: catcrawl-coles-env-secret, key: API_URL } }
              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
              volumeMounts:
                - name: chrome-profile
                  mountPath: /data/chrome-profile
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: chrome-profile
              persistentVolumeClaim:
                claimName: catcrawl-coles-chrome-profile
            # Chromium uses /dev/shm for shared memory between processes.
            # The kubelet's default 64MB tmpfs runs out mid-page; backing
            # /dev/shm with a memory-medium emptyDir avoids that.
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catcrawl-coles-chrome-profile
  namespace: default
spec:
  accessModes: ["ReadWriteMany"]   # NFS supports RWX, useful if you ever want a parallel debug pod
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs-csi
