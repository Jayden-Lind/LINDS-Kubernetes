apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  # Pinned Argo CD version - bump this to upgrade Argo CD via GitOps
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.5/manifests/install.yaml

patches:
  # TLS terminates at the nginx ingress (base/nginx/argocd.yml), so the
  # server runs plaintext HTTP behind it.
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
  # Relax the reconciliation loop - homelab doesn't need 3min polling.
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        timeout.reconciliation: 3600s
        timeout.reconciliation.jitter: 300s
