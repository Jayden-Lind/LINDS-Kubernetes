apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: home-assistant
  namespace: argocd
spec:
  namespace: argocd
  writeBackConfig:
    method: argocd
  applicationRefs:
    - namePattern: home-assistant
      images:
        - alias: home-assistant
          imageName: ghcr.io/home-assistant/home-assistant:latest
          commonUpdateSettings:
            updateStrategy: digest
          manifestTargets:
            helm:
              values:
                image.tag: latest

