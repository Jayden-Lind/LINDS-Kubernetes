apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-secret
  namespace: monitoring
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  # refreshInterval and the remoteRef strategies are ESO webhook defaults,
  # declared explicitly so ArgoCD's diff matches the live object.
  refreshInterval: 1h0m0s
  target:
    name: alertmanager-discord-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: discord_webhook_url
      remoteRef:
        key: linds-keyvault/alertmanager-discord-secret
        property: discord_webhook_url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
