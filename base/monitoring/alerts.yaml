apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: linds-kubernetes-alerts
  namespace: monitoring
  labels:
    release: monitoring-kube-prometheus-stack
spec:
  groups:
    - name: kubernetes.nodes
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been in a non-ready state for more than 2 minutes."

        - alert: NodeMemoryHigh
          expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has less than 10% memory available."

        - alert: NodeMemoryCritical
          expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical memory on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has less than 5% memory available."

        - alert: NodeDiskAlmostFull
          expr: >
            (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/boot.*"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/boot.*"}
            ) < 0.10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Disk almost full on {{ $labels.instance }}"
            description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 10% free."

        - alert: NodeDiskFull
          expr: >
            (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/boot.*"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/boot.*"}
            ) < 0.03
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Disk critically full on {{ $labels.instance }}"
            description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 3% free."

        - alert: NodeCPUHighLoad
          expr: >
            (1 - avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} CPU utilisation is above 90% sustained for 15 minutes."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} disk pressure"
            description: "Node {{ $labels.node }} has DiskPressure condition active — kubelet may begin evicting pods."

        - alert: NodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} memory pressure"
            description: "Node {{ $labels.node }} has MemoryPressure condition active — kubelet may begin evicting pods."

    - name: kubernetes.pods
      rules:
        - alert: PodCrashLooping
          expr: >
            max_over_time(kube_pod_container_status_waiting_reason{
              reason="CrashLoopBackOff",
              namespace!~"kube-system"
            }[10m]) >= 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) is in CrashLoopBackOff."

        - alert: PodNotReady
          expr: >
            kube_pod_status_phase{phase=~"Pending|Unknown",namespace!~"kube-system"}
            * on(namespace, pod) group_left(owner_kind)
            kube_pod_owner{owner_kind!="Job"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been in {{ $labels.phase }} state for more than 10 minutes."

        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} OOM killed"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) was killed due to out of memory."

        - alert: PodImagePullError
          expr: >
            max_over_time(kube_pod_container_status_waiting_reason{
              reason=~"ImagePullBackOff|ErrImagePull"
            }[10m]) >= 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} image pull error"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) cannot pull image: {{ $labels.reason }}."

    - name: kubernetes.workloads
      rules:
        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas > kube_deployment_status_available_replicas
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
            description: "Deployment {{ $labels.deployment }} in {{ $labels.namespace }} has fewer available replicas than desired."

        - alert: StatefulSetReplicasMismatch
          expr: kube_statefulset_replicas != kube_statefulset_status_replicas_ready
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} replica mismatch"
            description: "StatefulSet {{ $labels.statefulset }} in {{ $labels.namespace }} has {{ $value }} replicas not ready."

        - alert: DaemonSetNotFullyScheduled
          expr: >
            kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_number_available > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} not fully scheduled"
            description: "DaemonSet {{ $labels.daemonset }} in {{ $labels.namespace }} has {{ $value }} pods unavailable."

    - name: kubernetes.storage
      rules:
        - alert: PVCNotBound
          expr: kube_persistentvolumeclaim_status_phase{phase!="Bound"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} not bound"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is in {{ $labels.phase }} state."

        - alert: PVCAlmostFull
          expr: >
            kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} almost full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} has less than 15% free space remaining."

        - alert: PVCFull
          expr: >
            kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} critically full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} has less than 5% free space — imminent write failures."

    - name: argocd
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} out of sync"
            description: "ArgoCD application {{ $labels.name }} (project: {{ $labels.project }}) has sync status: {{ $labels.sync_status }}."

        - alert: ArgoCDAppUnhealthy
          expr: argocd_app_info{health_status!~"Healthy|Progressing|Suspended"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} unhealthy"
            description: "ArgoCD application {{ $labels.name }} has health status: {{ $labels.health_status }}."

        - alert: ArgoCDAppDegraded
          expr: argocd_app_info{health_status="Degraded"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is degraded"
            description: "ArgoCD application {{ $labels.name }} is in Degraded health state."

        - alert: ArgoCDSyncError
          expr: argocd_app_info{operation_phase="Error"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} sync error"
            description: "ArgoCD application {{ $labels.name }} sync operation is in Error phase."

    - name: certificates
      rules:
        - alert: CertificateExpiringSoon
          expr: >
            certmanager_certificate_expiration_timestamp_seconds - time() < (14 * 24 * 3600)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring in < 14 days"
            description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanizeDuration }}."

        - alert: CertificateExpiringCritical
          expr: >
            certmanager_certificate_expiration_timestamp_seconds - time() < (7 * 24 * 3600)
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring in < 7 days"
            description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanizeDuration }}."

        - alert: CertificateNotReady
          expr: >
            max by(name, namespace) (certmanager_certificate_ready_status{condition="False"}) == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} not ready"
            description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} is not in a ready state."

    - name: postgresql
      rules:
        - alert: PostgreSQLDown
          expr: cnpg_pg_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL {{ $labels.cluster }} is down"
            description: "CloudNativePG cluster {{ $labels.cluster }} instance {{ $labels.pod }} is not responding to connections."

        - alert: PostgreSQLHighConnections
          expr: >
            cnpg_backends_total
            / on(cluster, namespace) group_left()
            cnpg_pg_settings_value{name="max_connections"} > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL {{ $labels.cluster }} connection usage high"
            description: "PostgreSQL cluster {{ $labels.cluster }} is using more than 80% of available connections."

        - alert: PostgreSQLReplicationLag
          expr: cnpg_pg_stat_replication_pg_wal_lsn_diff > 52428800
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL {{ $labels.cluster }} replication lag"
            description: "PostgreSQL cluster {{ $labels.cluster }} has replication lag exceeding 50MB — standby is falling behind."

        - alert: PostgreSQLWALArchivingFailing
          expr: cnpg_pg_stat_archiver_last_failed_time > cnpg_pg_stat_archiver_last_archived_time
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL {{ $labels.cluster }} WAL archiving is failing"
            description: "WAL archiving to the backup object store has been failing for 15 minutes on {{ $labels.pod }}. PITR recovery window is not growing and pg_wal may fill up."

        - alert: PostgreSQLWALArchivingStale
          expr: cnpg_pg_stat_archiver_seconds_since_last_archival > 129600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL {{ $labels.cluster }} has not archived WAL in 36h"
            description: "No WAL segment has been archived for over 36 hours on {{ $labels.pod }}. The nightly base backup forces a segment switch, so this indicates backups or archiving have silently stopped."

    - name: nginx
      rules:
        # NOTE: this cluster runs the NGINX Inc controller (ghcr.io/nginx),
        # whose metrics differ from kubernetes/ingress-nginx. Per-request
        # status codes and latency come from the latency-metrics collector
        # (enableLatencyMetrics: true), labelled by resource_name/namespace.
        - alert: NginxHighErrorRate
          expr: >
            (
              sum by(resource_name, resource_namespace) (rate(nginx_ingress_controller_upstream_server_response_latency_ms_count{code=~"5.."}[5m]))
              / sum by(resource_name, resource_namespace) (rate(nginx_ingress_controller_upstream_server_response_latency_ms_count{code=~"[0-9].."}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "NGINX {{ $labels.resource_namespace }}/{{ $labels.resource_name }} high 5xx rate"
            description: "NGINX ingress {{ $labels.resource_name }} in {{ $labels.resource_namespace }} has a {{ $value | humanizePercentage }} 5xx error rate."

        - alert: NginxConfigReloadError
          expr: nginx_ingress_controller_nginx_last_reload_status == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "NGINX Ingress Controller config reload failed"
            description: "NGINX Ingress Controller failed to reload its configuration ({{ $labels.pod }})."

        - alert: NginxHighLatency
          expr: >
            histogram_quantile(0.99, sum by(le, resource_name, resource_namespace) (
              rate(nginx_ingress_controller_upstream_server_response_latency_ms_bucket[5m])
            )) > 5000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "NGINX {{ $labels.resource_namespace }}/{{ $labels.resource_name }} high P99 latency"
            description: "NGINX ingress {{ $labels.resource_name }} in {{ $labels.resource_namespace }} P99 upstream latency is {{ $value }}ms."

    - name: external-secrets
      rules:
        - alert: ExternalSecretSyncError
          expr: >
            externalsecret_status_condition{type="Ready",status="False"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} sync failed"
            description: "ExternalSecret {{ $labels.name }} in {{ $labels.namespace }} is failing to sync from Vault."

    - name: monitoring
      rules:
        - alert: PrometheusTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} down"
            description: "Prometheus target {{ $labels.instance }} for job {{ $labels.job }} has been unreachable for 5 minutes."

        - alert: AlertmanagerConfigError
          expr: alertmanager_config_last_reload_successful == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Alertmanager configuration reload failed"
            description: "Alertmanager failed to reload its configuration — alert routing may be broken."

        - alert: LokiNotIngesting
          expr: sum(rate(loki_ingester_streams_created_total[5m])) == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Loki not ingesting log streams"
            description: "Loki has not ingested any new log streams for 10 minutes."

        - alert: PrometheusRuleEvaluationSlow
          expr: prometheus_rule_evaluation_duration_seconds{quantile="0.9"} > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus rule evaluation slow"
            description: "Prometheus rule group {{ $labels.rule_group }} evaluation is taking {{ $value | humanizeDuration }} at P90."
