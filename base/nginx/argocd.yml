apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: linds-ca
    nginx.org/ssl-redirect: "true"
    # argocd-server runs in insecure mode (plaintext HTTP on :8080).
    # Do NOT use nginx.org/grpc-services here: this controller only proxies
    # native gRPC when http2 is enabled globally, and once it is, grpc_pass
    # takes over the whole "/" location and breaks the web UI (502). ArgoCD's
    # UI and CLI both work over gRPC-Web on plain HTTP, so a normal HTTP
    # backend is all that's needed. For the CLI use: argocd login --grpc-web.
    nginx.org/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.linds.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts:
        - argocd.linds.com.au
      secretName: argocd-linds-com-au-tls
