apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
      errors
      health {
        lameduck 5s
      }
      ready
      kubernetes k8s.linds.com.au cluster.local in-addr.arpa ip6.arpa {
        pods insecure
        fallthrough in-addr.arpa ip6.arpa
        ttl 30
      }
      prometheus :9153
      # Forward straight to the real upstreams. The previous /etc/resolv.conf
      # path went through Talos hostDNS (169.254.116.108), which drops queries
      # under Cilium socketLB - constant i/o timeouts and 5s stalls in pods.
      # sequential = prefer VyOS (full recursion for external names; the DC
      # answers linds.com.au but does not recurse), DC as fallback.
      forward . 10.0.53.1 10.0.50.200 {
        policy sequential
        max_concurrent 1000
      }
      cache 300
      loop
      reload
      loadbalance
    }