apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-iscsi-arr-suite
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
  iscsi:
    targetPortal: "10.0.50.246:3260"
    portals: []
    iqn: "iqn.2005-10.org.truenas:arr-suite"
    lun: 0
    fsType: ext4
    readOnly: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linds-arr-config
  namespace: arr
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
  volumeName: pv-iscsi-arr-suite
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: linds-nfs-nas
  labels:
    storage.k8s.io/name: nfs
    storage.k8s.io/part-of: kubernetes-complete-reference
    volume.beta.kubernetes.io/mount-options: soft
spec:
  accessModes:
    - ReadWriteOnce
    - ReadOnlyMany
    - ReadWriteMany
  capacity:
    storage: 1Ti
  storageClassName: "manual"
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nfs:
    server: linds-truenas-01.linds.com.au
    path: /mnt/ZFS_NAS
    readOnly: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linds-nfs-nas-pvc
  namespace: arr
spec:
  storageClassName: "manual"
  volumeName: linds-nfs-nas
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: arr
spec:
  selector:
    matchLabels:
      app: jackett
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jackett
    spec:
      terminationGracePeriodSeconds: 120
      nodeSelector:
        datacenter: linds
      containers:
        - name: jackett
          image: linuxserver/jackett:latest
          volumeMounts:
            - mountPath: /config
              name: arr-config
              subPath: jackett
          ports:
            - containerPort: 9117
      restartPolicy: Always
      volumes:
        - name: arr-config
          persistentVolumeClaim:
            claimName: linds-arr-config
---
apiVersion: v1
kind: Service
metadata:
  name: jackett
  namespace: arr
spec:
  ports:
    - port: 9117
      targetPort: 9117
      protocol: TCP
      name: http
  selector:
    app: jackett
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jackett
  namespace: arr
  annotations:
    cert-manager.io/cluster-issuer: linds-ca
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: jackett.linds.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jackett
                port:
                  number: 9117
  tls:
    - hosts:
        - jackett.linds.com.au
      secretName: jackett-linds-com-au-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: arr
spec:
  selector:
    matchLabels:
      app: radarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr
    spec:
      terminationGracePeriodSeconds: 120
      nodeSelector:
        datacenter: linds
      containers:
        - name: radarr
          image: linuxserver/radarr:latest
          env:
            - name: GUID
              value: "0"
            - name: PUID
              value: "1000"
          volumeMounts:
            - mountPath: /config
              name: arr-config
              subPath: radarr
            - name: linds-nfs-nas
              mountPath: /mnt/nas/torrent
              subPath: torrent
            - name: linds-nfs-nas
              mountPath: /mnt/nas/Movies
              subPath: Movies
          ports:
            - containerPort: 7878
      restartPolicy: Always
      volumes:
        - name: arr-config
          persistentVolumeClaim:
            claimName: linds-arr-config
        - name: linds-nfs-nas
          persistentVolumeClaim:
            claimName: linds-nfs-nas-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: arr
spec:
  ports:
    - port: 7878
      targetPort: 7878
      protocol: TCP
      name: http
  selector:
    app: radarr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarr
  namespace: arr
  annotations:
    cert-manager.io/cluster-issuer: linds-ca
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: radarr.linds.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radarr
                port:
                  number: 7878
  tls:
    - hosts:
        - radarr.linds.com.au
      secretName: radarr-linds-com-au-tls
---
