apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorio
  labels:
    app: factorio
spec:
  selector:
    matchLabels:
      app: factorio
  # Never run two servers against the same NFS save during a rollout.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: factorio
    spec:
      nodeSelector:
        datacenter: jd
      containers:
        - name: factorio
          image: factoriotools/factorio:stable
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
          ports:
            - containerPort: 34197
              protocol: UDP
            - containerPort: 27015
          volumeMounts:
            - mountPath: /factorio
              name: jd-nfs-pvc
              subPath: factorio
          env:
            - name: CONFIG
              value: /factorio/config
            - name: PORT
              value: "34197"
            - name: RCON_PORT
              value: "27015"
            - name: PUID
              value: "845"
            - name: PGID
              value: "845"
            - name: SAVE_NAME
              value: me_and_obro
            - name: DLC_SPACE_AGE
              value: "false"
      volumes:
        - name: jd-nfs-pvc
          persistentVolumeClaim:
            claimName: jd-nfs-pvc
