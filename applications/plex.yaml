apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex-jd
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: plex-jd
  sources:
    - repoURL: https://raw.githubusercontent.com/plexinc/pms-docker/gh-pages
      chart: plex-media-server
      targetRevision: 1.5.0
      helm:
        values: |
          nameOverride: plex-jd
          ingress:
            enabled: true
            ingressClassName: nginx
            url: plex.linds.com.au
            tls:
              - hosts:
                - plex.linds.com.au
                secretName: plex.linds.com.au
            annotations:
              cert-manager.io/cluster-issuer: linds-ca
              # Stream media through instead of buffering (seeking / direct play)
              nginx.org/proxy-buffering: "false"
              # Plex uses websockets for live notifications (/:/websockets/...)
              nginx.org/websocket-services: "plex-jd"
          pms:
            # Plex's SQLite library DB belongs on block storage, not NFS.
            storageClassName: zfs-iscsi
            configStorage: 50Gi
          service:
            type: LoadBalancer
          nodeSelector:
            datacenter: jd
          extraVolumeMounts:
            - name: nas
              mountPath: /data/media
            - name: holiday
              mountPath: /data/holiday
          extraVolumes:
            - name: holiday
              persistentVolumeClaim:
                claimName: holiday-videos-pvc
            - name: nas
              persistentVolumeClaim:
                claimName: jd-torrent-pvc
    - repoURL: "https://github.com/Jayden-Lind/LINDS-Kubernetes"
      targetRevision: HEAD
      path: plex-jd/
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

