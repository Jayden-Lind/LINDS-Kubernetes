apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mumble
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: mumble
  source:
    repoURL: https://syntax3rror404.github.io/helm-charts/charts
    chart: mumble
    targetRevision: 1.0.2
    helm:
      values: |
        service:
          type: LoadBalancer
        nodeSelector:
          datacenter: jd
        persistence:
          storageClass: nfs-csi
  ignoreDifferences:
    # hostNetwork: the chart renders the explicit false and the API prunes the
    # default from the live object. volumeClaimTemplates: the API decorates
    # each template item with apiVersion/kind/volumeMode/status the chart
    # doesn't render. Both are permanent OutOfSync noise otherwise.
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.template.spec.hostNetwork
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

