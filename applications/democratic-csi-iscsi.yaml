apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-iscsi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://democratic-csi.github.io/charts/"
    chart: democratic-csi
    targetRevision: 0.15.1
    helm:
      releaseName: democratic-csi-iscsi
      valuesObject:
        csiDriver:
          name: "org.democratic-csi.iscsi"
        storageClasses:
          - name: zfs-iscsi
            defaultClass: false
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: ext4
            mountOptions: []
            secrets:
              provisioner-secret:
              controller-publish-secret:
              node-stage-secret:
              node-publish-secret:
              controller-expand-secret:
        driver:
          # config (with SSH private key) lives in a manually-created secret:
          # kubectl create secret generic democratic-csi-iscsi-config -n democratic-csi \
          #   --from-file=driver-config-file.yaml=<config>
          existingConfigSecret: democratic-csi-iscsi-config
          config:
            driver: zfs-generic-iscsi
        controller:
          driver:
            logLevel: info
        node:
          hostPID: true
          driver:
            # Talos: iscsiadm lives in the iscsi-tools system extension,
            # reachable from the host namespace via nsenter
            extraEnv:
              - name: ISCSIADM_HOST_STRATEGY
                value: nsenter
              - name: ISCSIADM_HOST_PATH
                value: /usr/local/sbin/iscsiadm
            # The chart's built-in iscsi-info volume already exposes the host's
            # /var/lib/iscsi (the path that matters on Talos, where iscsiadm
            # runs via nsenter anyway). iscsi-dir must still point somewhere:
            # the default /etc/iscsi doesn't exist on Talos (mount failure),
            # and /var/lib/iscsi duplicates iscsi-info (apply failure) - so
            # park it on a harmless auto-created path.
            iscsiDirHostPath: /var/lib/iscsi-cfg
            iscsiDirHostPathType: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
