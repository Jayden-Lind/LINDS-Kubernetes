apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-iscsi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://democratic-csi.github.io/charts/"
    chart: democratic-csi
    targetRevision: 0.15.1
    helm:
      releaseName: democratic-csi-iscsi
      valuesObject:
        csiDriver:
          name: "org.democratic-csi.iscsi"
        storageClasses:
          - name: zfs-iscsi
            defaultClass: false
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: ext4
            mountOptions: []
            secrets:
              provisioner-secret:
              controller-publish-secret:
              node-stage-secret:
              node-publish-secret:
              controller-expand-secret:
        driver:
          # config (with SSH private key) lives in a manually-created secret:
          # kubectl create secret generic democratic-csi-iscsi-config -n democratic-csi \
          #   --from-file=driver-config-file.yaml=<config>
          existingConfigSecret: democratic-csi-iscsi-config
          config:
            driver: zfs-generic-iscsi
        controller:
          driver:
            logLevel: info
        node:
          hostPID: true
          driver:
            # Talos: iscsiadm lives in the iscsi-tools system extension,
            # reachable from the host namespace via nsenter
            extraEnv:
              - name: ISCSIADM_HOST_STRATEGY
                value: nsenter
              - name: ISCSIADM_HOST_PATH
                value: /usr/local/sbin/iscsiadm
            # NOTE: no iscsiDirHostPath here - the chart already mounts its
            # built-in iscsi-info hostPath volume at /var/lib/iscsi; declaring
            # it again produced a duplicate mountPath the typed-patch apply
            # rejects (permanent sync failure).
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
