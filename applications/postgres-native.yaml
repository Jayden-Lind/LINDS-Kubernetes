apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnativepg-operator
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql-linds
  sources:
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: 0.28.2
    - repoURL: https://github.com/Jayden-Lind/LINDS-Kubernetes
      targetRevision: master
      path: postgresql
    - repoURL: https://cloudnative-pg.github.io/grafana-dashboards
      chart: cluster
      targetRevision: v0.0.5
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - .spec.managed.roles[].connectionLimit
        - .spec.managed.roles[].inherit
        - .spec.plugins[].enabled
        - .spec.plugins[].isWALArchiver
        - .spec.externalClusters[].plugin.enabled
        - .spec.externalClusters[].plugin.isWALArchiver
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - Validate=false
      - ServerSideApply=true
      - CreateNamespace=true

