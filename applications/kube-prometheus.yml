apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.1.2
    helm:
      values: |
        grafana:
          dashboards:
            default:
              cilium-metrics:
                gnetId: 21431
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-operator:
                gnetId: 16612
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-hubble:
                gnetId: 16613
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-policy-verdicts:
                gnetId: 18015
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-flows:
                gnetId: 23862
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
            infrastructure:
              cert-manager:
                gnetId: 20842
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              external-dns:
                gnetId: 15038
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              external-secrets:
                gnetId: 21640
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              vault:
                gnetId: 12904
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: cilium
                orgId: 1
                folder: Cilium
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
              - name: infrastructure
                orgId: 1
                folder: Infrastructure
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/infrastructure
          admin:
            existingSecret: grafana-credentials
          persistence:
            enabled: true
            size: 10Gi
            storageClassName: nfs-csi
          service:
            type: ClusterIP
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                timeout: 60
                maxLines: 5000
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: linds-ca
              # Grafana Live (dashboards, log tail) uses websockets
              nginx.org/websocket-services: "monitoring-kube-prometheus-stack-grafana"
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.linds.com.au
            tls:
              - secretName: grafana.linds.com.au
                hosts:
                  - grafana.linds.com.au
            path: /
        prometheus:
          ingress:
            enabled: false
          prometheusSpec:
            # Whichever hits first triggers deletion: 30 days OR 25GB
            retention: 30d
            retentionSize: "25GB"
            scrapeInterval: 30s
            evaluationInterval: 30s
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 30Gi
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            inhibit_rules:
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity =~ warning|info
                equal:
                  - namespace
                  - alertname
            route:
              group_by:
                - alertname
                - namespace
                - severity
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: discord
              routes:
                - matchers:
                    - alertname =~ "InfoInhibitor|Watchdog"
                  receiver: 'null'
            receivers:
              - name: 'null'
              - name: discord
                discord_configs:
                  - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord-secret/discord_webhook_url
                    title: '{{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}{{ with .GroupLabels.namespace }} ({{ . }}){{ end }}'
                    message: |-
                      {{ range .Alerts -}}
                      **{{ .Labels.alertname }}** | Severity: {{ .Labels.severity }}
                      {{ if .Labels.namespace -}}Namespace: `{{ .Labels.namespace }}`
                      {{ end -}}
                      {{ if .Labels.pod -}}Pod: `{{ .Labels.pod }}`
                      {{ end -}}
                      {{ if .Labels.node -}}Node: `{{ .Labels.node }}`
                      {{ end -}}
                      {{ if .Annotations.summary -}}> {{ .Annotations.summary }}
                      {{ end -}}
                      {{ end }}
          alertmanagerSpec:
            secrets:
              - alertmanager-discord-secret
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

