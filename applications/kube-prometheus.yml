apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.1.2
    helm:
      values: |
        grafana:
          dashboards:
            default:
              cilium-metrics:
                gnetId: 21431
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-operator:
                gnetId: 16612
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-hubble:
                gnetId: 16613
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-policy-verdicts:
                gnetId: 18015
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-flows:
                gnetId: 23862
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
            infrastructure:
              cert-manager:
                gnetId: 20842
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              external-dns:
                gnetId: 15038
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              external-secrets:
                gnetId: 21640
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              vault:
                gnetId: 12904
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: cilium
                orgId: 1
                folder: Cilium
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
              - name: infrastructure
                orgId: 1
                folder: Infrastructure
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/infrastructure
          admin:
            existingSecret: grafana-credentials
          nodeSelector:
            datacenter: jd
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
          persistence:
            enabled: true
            size: 10Gi
            storageClassName: nfs-csi
          service:
            type: ClusterIP
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                timeout: 60
                maxLines: 5000
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: linds-ca
              # Grafana Live (dashboards, log tail) uses websockets
              nginx.org/websocket-services: "monitoring-kube-prometheus-stack-grafana"
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.linds.com.au
            tls:
              - secretName: grafana.linds.com.au
                hosts:
                  - grafana.linds.com.au
            path: /
        prometheus:
          ingress:
            enabled: false
          prometheusSpec:
            # Whichever hits first triggers deletion: 30 days OR 25GB
            retention: 30d
            retentionSize: "25GB"
            scrapeInterval: 30s
            evaluationInterval: 30s
            # TSDB lives on JD-side iSCSI now; keep the pod next to it.
            nodeSelector:
              datacenter: jd
            resources:
              requests:
                cpu: 200m
                memory: 1536Mi
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: zfs-iscsi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 30Gi
        alertmanager:
          # Routes/receivers live in the AlertmanagerConfig CR
          # (base/monitoring/alertmanager-config.yaml). The chart's raw config
          # path cannot reference the Discord webhook from a secret - the
          # operator's parser has no webhook_url_file - and it silently fell
          # back to a null config (no alerts delivered at all).
          alertmanagerSpec:
            alertmanagerConfiguration:
              name: global-alertmanager-config
              global:
                resolveTimeout: 5m
            nodeSelector:
              datacenter: jd
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          # kube-proxy is replaced by Cilium (kubeProxyReplacement) - scraping
          # it only produced a permanent KubeProxyDown false positive.
          enabled: false
        prometheusOperator:
          prometheusConfigReloader:
            # The default limit OOM-killed the reloader on 2026-07-13.
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

