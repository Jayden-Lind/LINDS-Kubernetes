apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.1.2
    helm:
      values: |
        grafana:
          dashboards:
            default:
              cilium-metrics:
                gnetId: 21431
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-operator:
                gnetId: 16612
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-hubble:
                gnetId: 16613
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-policy-verdicts:
                gnetId: 18015
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
              cilium-flows:
                gnetId: 23862
                revision: 1
                datasource:
                  - name: DS_PROMETHEUS
                    value: prometheus
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: cilium
                orgId: 1
                folder: Cilium
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
          admin:
            existingSecret: grafana-credentials
          persistence:
            enabled: true
            size: 10Gi
            storageClassName: nfs-csi
          service:
            type: ClusterIP
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                timeout: 60
                maxLines: 5000
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: linds-ca
            enabled: true
            ingressClassName: nginx
            hosts: 
              - grafana.linds.com.au
            tls:
              - secretName: grafana.linds.com.au
                hosts:
                  - grafana.linds.com.au
            path: /
        prometheus:
          ingress:
            enabled: false
          prometheusSpec:
            # Whichever hits first triggers deletion: 30 days OR 25GB
            retention: 30d
            retentionSize: "25GB"
            scrapeInterval: 30s
            evaluationInterval: 30s
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 30Gi
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

