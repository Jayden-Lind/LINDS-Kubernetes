---
# App-of-apps: syncs every Application manifest directly in applications/
# (including itself and argocd). Adding a new app = committing a new file here.
# Subdirectories are NOT synced (recurse is off) - park apps you don't want
# deployed in applications/disabled/ and they are ignored.
# Pruning the root app only deletes the Application object, not the
# workloads it deployed (no finalizer is set on the child apps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Jayden-Lind/LINDS-Kubernetes"
    targetRevision: HEAD
    path: "applications"
    directory:
      recurse: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
