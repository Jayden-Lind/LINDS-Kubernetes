apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  source:
    chart: nginx-ingress
    repoURL: ghcr.io/nginx/charts
    targetRevision: 2.5.2
    helm:
      releaseName: nginx-ingress
      valuesObject:
        controller:
          kind: daemonset
          hostNetwork: false
          disableIPV6: true
          enableExternalDNS: true
          service:
            create: true
            type: LoadBalancer
            externalTrafficPolicy: Local
          mgmt:
            resolver:
              ipv6: false
          enableLatencyMetrics: true
          ingressClass:
            name: nginx
            create: true
            setAsDefaultIngress: true
          config:
            entries:
              client-max-body-size: "0"
              proxy-read-timeout: "3600"
              proxy-send-timeout: "3600"
              # Enable HTTP/2 for all TLS servers on this controller.
              # This controller defaults http2 to false; there is no per-Ingress
              # toggle, so it must be set here on the ConfigMap.
              http2: "true"
              # Reuse upstream connections (off by default) - throughput win for
              # the chatty UIs (arr, grafana) and APIs.
              keepalive: "32"
              # Force HTTPS on every host. Safe because linds-ca is a private CA
              # issuer (no HTTP-01 challenge on :80 to break).
              redirect-to-https: "true"
              # Stop advertising the nginx version.
              server-tokens: "false"
              # HSTS on all TLS hosts. Sticky in browsers - only because every
              # *.linds.com.au host is (and stays) HTTPS.
              hsts: "true"
              hsts-max-age: "31536000"
        prometheus:
          create: true
          port: 9113
          service:
            create: true
          serviceMonitor:
            create: true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion
    - kind: Service
      jqPathExpressions:
        - .spec.clusterIP
        - .spec.clusterIPs
        - .spec.ipFamilies
        - .spec.ipFamilyPolicy
        - .spec.internalTrafficPolicy
        - .spec.sessionAffinity
        - .spec.allocateLoadBalancerNodePorts
        - .spec.healthCheckNodePort
        # apiserver assigns nodePorts on LoadBalancer services and attributes
        # them to the SSA applier - permanent OutOfSync unless ignored.
        - .spec.ports[].nodePort
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
