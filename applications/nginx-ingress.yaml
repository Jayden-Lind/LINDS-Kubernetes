apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  source:
    chart: nginx-ingress
    repoURL: ghcr.io/nginx/charts
    targetRevision: 2.4.4
    helm:
      releaseName: nginx-ingress
      valuesObject:
        controller:
          kind: daemonset
          hostNetwork: false
          disableIPV6: true
          enableExternalDNS: true
          service:
            create: true
            type: LoadBalancer
            externalTrafficPolicy: Local
          mgmt:
            resolver:
              ipv6: false
          enableLatencyMetrics: true
          ingressClass:
            name: nginx
            create: true
            setAsDefaultIngress: true
        prometheus:
          create: true
          port: 9113
          service:
            create: true
          serviceMonitor:
            create: true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion
    - kind: Service
      jqPathExpressions:
        - .spec.clusterIP
        - .spec.clusterIPs
        - .spec.ipFamilies
        - .spec.ipFamilyPolicy
        - .spec.internalTrafficPolicy
        - .spec.sessionAffinity
        - .spec.allocateLoadBalancerNodePorts
        - .spec.healthCheckNodePort
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
