apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  source:
    chart: nginx-ingress
    repoURL: ghcr.io/nginx/charts
    targetRevision: 2.3.0
    helm:
      releaseName: nginx-ingress
      valuesObject:
        controller:
          kind: deployment
          hostNetwork: false
          disableIPV6: true
          defaultTLS:
            secret: "nginx-ingress/linds-certificate-secret"
            cert: "nginx-ingress/linds-certificate-secret"
          extraArgs:
            default-ssl-certificate: "nginx-ingress/linds-certificate-secret"
          service:
            externalIPs:
              - 172.16.1.20
          enableExternalDNS: true
          mgmt:
            resolver:
              ipv6: false
          replicaCount: 1 
          enableLatencyMetrics: true
          ingressClass:
            name: nginx
            create: true
            setAsDefaultIngress: true
        prometheus:
          create: true
          port: 9113
          service:
            create: true
          serviceMonitor:
            create: true
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
